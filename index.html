<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- ── Primary Meta ── -->
  <title>Laye Movies — Discover Cinema's Greatest Treasures | Free & Legal Films</title>
  <meta name="description" content="Laye Movies is a free, legal movie discovery platform featuring public domain classics, creative commons films, and officially free independent movies. TikTok-style reels for cinema.">
  <meta name="keywords" content="public domain movies, free movies, classic cinema, silent films, legal streaming, creative commons films, independent films, nosferatu, metropolis, chaplin">
  <meta name="author" content="Laye Movies">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#080808">
  <link rel="canonical" href="https://laye.xyz/">

  <!-- ── Open Graph ── -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Laye Movies">
  <meta property="og:title" content="Laye Movies — Free & Legal Cinema Discovery">
  <meta property="og:description" content="Discover public domain masterpieces and free independent films in a TikTok-style movie reel experience. 100% free, 100% legal.">
  <meta property="og:image" content="https://laye.xyz/og-image.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://laye.xyz/">
  <meta property="og:locale" content="en_US">
  <meta property="og:locale:alternate" content="ar_SA">
  <meta property="og:locale:alternate" content="fr_FR">
  <meta property="og:locale:alternate" content="es_ES">

  <!-- ── Twitter/X Cards ── -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@layexyz">
  <meta name="twitter:creator" content="@layexyz">
  <meta name="twitter:title" content="Laye Movies — Free & Legal Cinema Discovery">
  <meta name="twitter:description" content="Public domain cinema in a TikTok-style reel experience. Free & legal.">
  <meta name="twitter:image" content="https://laye.xyz/og-image.jpg">

  <!-- ── PWA / App Meta ── -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Laye Movies">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- ── Favicon ── -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23c9a84c'/><text y='.9em' font-size='72' font-family='serif' font-weight='900' fill='%23080808'>L</text></svg>">

  <!-- ── Stylesheet ── -->
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- ── schema.org WebSite ── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Laye Movies",
    "alternateName": "Laye",
    "url": "https://laye.xyz",
    "description": "Free and legal movie discovery platform featuring public domain classics, creative commons films, and officially free independent movies.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://laye.xyz/?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    },
    "sameAs": [
      "https://twitter.com/layexyz"
    ]
  }
  </script>

  <!-- ── schema.org VideoObject (example for featured film) ── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Movie",
    "name": "Nosferatu",
    "dateCreated": "1922",
    "director": {
      "@type": "Person",
      "name": "F.W. Murnau"
    },
    "description": "A vampire Count moves from Transylvania to Germany, bringing with him a plague and terrorizing an innocent couple.",
    "genre": ["Horror", "Classic Cinema"],
    "duration": "PT1H34M",
    "contentRating": "Unrated",
    "license": "Public Domain",
    "url": "https://laye.xyz/?movie=nosferatu-1922",
    "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/8/89/Nosferatu_Hutter_Knock.jpg/800px-Nosferatu_Hutter_Knock.jpg"
  }
  </script>
</head>

<body>
  <!-- Skip to main content for accessibility -->
  <a href="#app" class="sr-only" style="position:absolute;left:-9999px;top:0;z-index:9999;background:var(--gold);color:var(--ink);padding:8px 16px;border-radius:4px;font-weight:600;">Skip to main content</a>

  <!-- App Root -->
  <main id="app" role="main" aria-label="Laye Movies">
    <!-- Initial loading state -->
    <div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;flex-direction:column;gap:16px;">
      <div style="width:56px;height:56px;background:#c9a84c;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:36px;font-family:serif;font-weight:900;color:#080808;">L</div>
      <p style="color:#9e9a91;font-family:system-ui;font-size:14px;letter-spacing:.1em;text-transform:uppercase;">Loading Laye Movies…</p>
    </div>
  </main>

  <!-- Scripts: data layer first, then logic -->
  <script src="movies.js"></script>
  <script src="search.js"></script>
  <script src="recommendations.js"></script>
  <script src="app.js"></script>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>

  <!-- Noscript fallback -->
  <noscript>
    <style>#app { display: block !important; }</style>
    <div style="text-align:center;padding:40px;font-family:sans-serif;color:#f0ede6;background:#080808;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
      <h1 style="font-size:2rem;color:#c9a84c;">Laye Movies</h1>
      <p>JavaScript is required to run Laye Movies.</p>
      <p>Please enable JavaScript in your browser.</p>
    </div>
  </noscript>
</body>
</html>
